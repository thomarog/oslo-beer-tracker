<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1d2a" />
    <title>Halvliter — Oslo Beer Tracker</title>
    <meta
      name="description"
      content="Find the cheapest pilsner in Oslo. Compare prices per liter, happy hours, and outdoor seating across 24+ bars."
    />
    <meta property="og:title" content="Halvliter — Oslo Beer Tracker" />
    <meta
      property="og:description"
      content="Find the cheapest pilsner in Oslo. Live prices, happy hours, and utepils across the city."
    />

    <!-- Fonts: Cabinet Grotesk (display) + Satoshi (body) from Fontshare -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />

    <!-- MapLibre GL JS (cdnjs — more reliable than unpkg on iOS Safari) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js" crossorigin="anonymous"></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>

    <link rel="stylesheet" href="style.css?v=5" />

    <!-- Inline SVG favicon: mini beer glass logo -->
    <link
      rel="icon"
      href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect x="9" y="5" width="14" height="22" rx="2" fill="%23f5b836"/><rect x="9" y="5" width="14" height="5" fill="%23fff8e0"/><rect x="23" y="10" width="4" height="10" rx="1" fill="none" stroke="%230b1d2a" stroke-width="1.5"/><path d="M9 5h14v22H9z" fill="none" stroke="%230b1d2a" stroke-width="1.5"/></svg>'
    />
  </head>

  <body>
    <!-- SVG defs for patterns/icons -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
          <circle cx="8" cy="8" r="0.8" fill="currentColor" opacity="0.12" />
        </pattern>
      </defs>
    </svg>

    <!-- HEADER -->
    <header class="app-header">
      <a href="#" class="brand" aria-label="Halvliter home">
        <!-- Logo: abstract beer mug in fjord-blue circle -->
        <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true">
          <circle cx="20" cy="20" r="19" fill="currentColor" />
          <g stroke="var(--color-bg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M13 12h11v18a2 2 0 0 1-2 2h-7a2 2 0 0 1-2-2z" />
            <path d="M24 16h3a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-3" />
            <line x1="13" y1="17" x2="24" y2="17" />
          </g>
        </svg>
        <div class="brand-text">
          <span class="brand-name">Halvliter</span>
          <span class="brand-sub">Oslo beer tracker</span>
        </div>
      </a>

      <div class="header-actions">
        <button
          class="icon-btn"
          id="locate-btn"
          title="Find bars near me"
          aria-label="Find bars near me"
          data-testid="button-locate"
        >
          <i data-lucide="locate-fixed"></i>
        </button>
        <button
          class="icon-btn"
          data-theme-toggle
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
          data-testid="button-theme"
        ></button>
      </div>
    </header>

    <!-- CONTROLS BAR -->
    <div class="controls" role="region" aria-label="Filters">
      <div class="controls-row">
        <div class="view-toggle" role="tablist" aria-label="View mode">
          <button
            role="tab"
            aria-selected="true"
            class="view-tab active"
            data-view="map"
            data-testid="tab-map"
          >
            <i data-lucide="map"></i><span>Map</span>
          </button>
          <button
            role="tab"
            aria-selected="false"
            class="view-tab"
            data-view="list"
            data-testid="tab-list"
          >
            <i data-lucide="list"></i><span>List</span>
          </button>
        </div>

        <button class="filter-btn" id="open-filters" data-testid="button-filters">
          <i data-lucide="sliders-horizontal"></i>
          <span>Filters</span>
          <span class="filter-count" id="filter-count" hidden>0</span>
        </button>

        <div class="sort-control">
          <label for="sort-select" class="sr-only">Sort</label>
          <select id="sort-select" data-testid="select-sort">
            <option value="price">Cheapest first</option>
            <option value="ppl">Best per-liter</option>
            <option value="name">A–Z</option>
            <option value="updated">Recently updated</option>
          </select>
        </div>

        <label class="toggle-happy">
          <input type="checkbox" id="happy-toggle" data-testid="toggle-happy" />
          <span class="toggle-label">
            <i data-lucide="clock-3"></i>
            Happy hour now
          </span>
        </label>
      </div>

      <!-- Legend -->
      <div class="legend" aria-label="Price tier legend">
        <span class="legend-item"><span class="dot dot-low"></span> Under 80 kr / 0.5L</span>
        <span class="legend-item"><span class="dot dot-mid"></span> 80–100 kr</span>
        <span class="legend-item"><span class="dot dot-high"></span> 100+ kr</span>
      </div>
    </div>

    <!-- MAIN -->
    <main class="app-main">
      <div id="map-view" class="view active" role="tabpanel">
        <div id="map"></div>
        <!-- Bottom sheet for selected venue on mobile / sidecard on desktop -->
        <aside id="selected-card" class="selected-card" hidden aria-live="polite"></aside>
        <!-- Results count badge -->
        <div class="map-badge" id="map-results-badge">
          <span id="results-count">24</span> bars
        </div>
      </div>

      <div id="list-view" class="view" role="tabpanel" hidden>
        <div id="venue-list" class="venue-list"></div>
        <div id="list-empty" class="empty-state" hidden>
          <i data-lucide="beer-off"></i>
          <h3>No bars match your filters</h3>
          <p>Try loosening the price slider or clearing a filter.</p>
          <button class="btn btn-primary" id="reset-filters-empty">Reset filters</button>
        </div>
      </div>
    </main>

    <!-- FILTERS DRAWER -->
    <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
    <aside class="drawer" id="filters-drawer" hidden aria-label="Filters" role="dialog" aria-modal="true">
      <header class="drawer-header">
        <h2>Filters</h2>
        <button class="icon-btn" id="close-filters" aria-label="Close filters">
          <i data-lucide="x"></i>
        </button>
      </header>

      <div class="drawer-body">
        <section class="filter-group">
          <h3>Max price per halvliter</h3>
          <div class="slider-wrap">
            <input
              type="range"
              id="price-slider"
              min="50"
              max="150"
              step="1"
              value="150"
              data-testid="slider-price"
            />
            <output id="price-output">150 kr</output>
          </div>
        </section>

        <section class="filter-group">
          <h3>Neighborhood</h3>
          <div id="neighborhood-chips" class="chip-group" role="group"></div>
        </section>

        <section class="filter-group">
          <h3>Atmosphere</h3>
          <div id="amenity-chips" class="chip-group" role="group"></div>
        </section>
      </div>

      <footer class="drawer-footer">
        <button class="btn btn-ghost" id="reset-filters">Reset</button>
        <button class="btn btn-primary" id="apply-filters">Show results</button>
      </footer>
    </aside>

    <!-- VENUE DETAIL SHEET -->
    <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
    <aside class="sheet" id="venue-sheet" hidden role="dialog" aria-modal="true" aria-label="Venue details">
      <!-- Populated by JS -->
    </aside>

    <!-- PRICE UPDATE MODAL -->
    <div class="sheet-backdrop" id="submit-backdrop" hidden></div>
    <aside class="sheet sheet-form" id="submit-sheet" hidden role="dialog" aria-modal="true" aria-label="Suggest a price update">
      <!-- Populated by JS -->
    </aside>

    <!-- TOAST -->
    <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

    <script type="module" src="app.js?v=5"></script>
  </body>
</html>
